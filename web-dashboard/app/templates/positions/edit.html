{% extends "layouts/app.html" %}

{% block content %}

<div class="mx-auto w-full max-w-2xl rounded-[2rem] border border-white/10 bg-slate-900/80 p-6 shadow-2xl shadow-cyan-950/10">
    <div class="mb-6 flex items-center justify-between gap-4">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.35em] text-cyan-300">Posisi</p>
            <h1 class="mt-2 text-2xl font-bold text-white">Edit Posisi</h1>
        </div>
        <a href="{{ url_for('positions.index') }}" class="rounded-xl border border-white/10 px-4 py-2 text-sm font-semibold text-white transition hover:bg-white/10">Kembali</a>
    </div>

    <form method="post" action="{{ url_for('positions.update', position_id=position.id) }}" class="space-y-5">
        <div>
            <label class="mb-2 block text-sm font-medium text-slate-200">Nama Posisi</label>
            <input type="text" name="nama" value="{{ position.nama }}" class="w-full rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-white outline-none transition focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20">
        </div>

        <div class="flex justify-end gap-3">
            <a href="{{ url_for('positions.index') }}" class="rounded-2xl border border-white/10 px-4 py-3 text-sm font-semibold text-white transition hover:bg-white/10">Batal</a>
            <button type="submit" class="rounded-2xl bg-cyan-400 px-4 py-3 text-sm font-bold text-slate-950 transition hover:bg-cyan-300">Update</button>
        </div>
    </form>
</div>

{% endblock %}
