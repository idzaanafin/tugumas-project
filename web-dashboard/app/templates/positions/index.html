{% extends "layouts/app.html" %}

{% block content %}

<div class="space-y-6">
	<div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
		<div>
			<p class="text-xl font-semibold uppercase tracking-[0.35em] text-cyan-300">Master Data</p>			
		</div>
		<a href="{{ url_for('positions.create') }}" class="inline-flex items-center justify-center rounded-2xl bg-cyan-400 px-4 py-3 text-sm font-bold text-slate-950 transition hover:bg-cyan-300">Tambah Posisi</a>
	</div>

	<div class="overflow-hidden rounded-[2rem] border border-white/10 bg-slate-900/80 shadow-2xl shadow-cyan-950/10">
		<table class="min-w-full divide-y divide-white/10 text-left text-sm text-slate-300">
			<thead class="bg-white/5 text-xs uppercase tracking-[0.2em] text-slate-400">
				<tr>
					<th class="px-6 py-4">Nama</th>
					<th class="px-6 py-4">Dibuat</th>
					<th class="px-6 py-4 text-right">Aksi</th>
				</tr>
			</thead>
			<tbody class="divide-y divide-white/5">
				{% for position in positions %}
					<tr class="hover:bg-white/5">
						<td class="px-6 py-4 font-medium text-white">{{ position.nama }}</td>
						<td class="px-6 py-4">{{ position.created_at.strftime('%d %b %Y') if position.created_at else '-' }}</td>
						<td class="px-6 py-4">
							<div class="flex justify-end gap-2">
								<a href="{{ url_for('positions.edit', position_id=position.id) }}" class="rounded-xl border border-white/10 px-4 py-2 text-xs font-semibold text-white transition hover:bg-white/10">Edit</a>
								<form method="post" action="{{ url_for('positions.delete', position_id=position.id) }}" onsubmit="return confirm('Hapus position ini?');">
									<button type="submit" class="rounded-xl border border-rose-500/30 px-4 py-2 text-xs font-semibold text-rose-200 transition hover:bg-rose-500/10">Hapus</button>
								</form>
							</div>
						</td>
					</tr>
				{% else %}
					<tr>
						<td colspan="3" class="px-6 py-10 text-center text-slate-400">Belum ada posisi.</td>
					</tr>
				{% endfor %}
			</tbody>
		</table>
	</div>
</div>
{% endblock %}
