<header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/70 px-4 py-4 backdrop-blur-xl sm:px-6 lg:px-8">
	<div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
		<div>
			<p class="text-xs font-semibold uppercase tracking-[0.3em] text-cyan-300">Dashboard</p>
			<h2 class="mt-1 text-lg font-semibold text-white">{{ title or 'Overview' }}</h2>
		</div>

		<div class="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm text-slate-200">
			<div class="flex h-9 w-9 items-center justify-center rounded-full bg-cyan-400 text-sm font-bold text-slate-950">
				{{ current_user.full_name[:1] }}
			</div>
			<div>
				<p class="font-semibold text-white">{{ current_user.full_name }}</p>
				<p class="text-xs text-slate-400">{{ current_user.role.value }}</p>
			</div>
		</div>
	</div>
</header>
