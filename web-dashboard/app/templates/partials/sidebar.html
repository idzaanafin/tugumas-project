<aside class="hidden h-screen w-72 flex-col overflow-y-auto border-r border-white/10 bg-slate-950/90 px-5 py-6 lg:flex">
	<div class="mb-8 rounded-3xl border border-white/10 bg-white/5 p-5 shadow-2xl shadow-cyan-950/20">
		<p class="text-xs font-bold text-center uppercase tracking-[0.5em] text-cyan-300">Tugumas Offset</p>				
	</div>

	<nav class="space-y-2">
		{% set current_endpoint = request.endpoint or '' %}
		{% for item in MENU %}
			{% set module_name = item.endpoint.split('.')[0] %}
			{% set is_active = current_endpoint.startswith(module_name ~ '.') %}
			<a href="{{ url_for(item.endpoint) }}" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium transition {{ 'bg-cyan-400 text-slate-950 shadow-lg shadow-cyan-500/25' if is_active else 'text-slate-300 hover:bg-white/5 hover:text-white' }}">
				<span class="inline-flex h-10 w-10 items-center justify-center rounded-xl {{ 'bg-slate-950/10' if is_active else 'bg-white/5' }}">
					<i data-lucide="{{ item.icon }}" class="h-5 w-5"></i>
				</span>
				<span>{{ item.title }}</span>
			</a>
		{% endfor %}
	</nav>

	<div class="mt-4 rounded-3xl border border-red-500/10 bg-red-600/5 p-4 text-sm text-slate-300">		
		<a href="{{ url_for('auth.logout') }}" class="ml-12 mt-4 rounded-xl border border-white/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.2em] text-white bg-red-600 transition hover:bg-red-900 ">Logout</a>
	</div>
</aside>
