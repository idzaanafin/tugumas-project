{% extends "layouts/app.html" %}

{% block content %}

<div class="space-y-6">
	<section class="rounded-[2rem] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-cyan-950/10">
		<p class="text-xs font-semibold uppercase tracking-[0.35em] text-cyan-300">Overview</p>
		<h1 class="mt-3 text-3xl font-bold text-white">Selamat datang, {{ current_user.username }}</h1>		
	</section>

	<section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
		<div class="rounded-[1.75rem] border border-white/10 bg-slate-900/80 p-5">
			<p class="text-sm text-slate-400">Pegawai</p>
			<p class="mt-2 text-3xl font-bold text-white">{{ summary.employees }}</p>
		</div>
		<div class="rounded-[1.75rem] border border-white/10 bg-slate-900/80 p-5">
			<p class="text-sm text-slate-400">Department</p>
			<p class="mt-2 text-3xl font-bold text-white">{{ summary.departments }}</p>
		</div>
		<div class="rounded-[1.75rem] border border-white/10 bg-slate-900/80 p-5">
			<p class="text-sm text-slate-400">Position</p>
			<p class="mt-2 text-3xl font-bold text-white">{{ summary.positions }}</p>
		</div>
		<div class="rounded-[1.75rem] border border-white/10 bg-slate-900/80 p-5">
			<p class="text-sm text-slate-400">User</p>
			<p class="mt-2 text-3xl font-bold text-white">{{ summary.users }}</p>
		</div>
	</section>
</div>

{% endblock %}
