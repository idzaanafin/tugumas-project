<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMO Apps{% if title %} - {{ title }}{% endif %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/flowbite@2.5.2/dist/flowbite.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{
            color-scheme: dark;
        }

        input[type="date"],
        input[type="time"],
        select{
            color-scheme: dark;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Firefox */
        * {
            scrollbar-width: thin;
            scrollbar-color: #22d3ee #0f172a;
        }

        /* Chrome, Edge, Safari */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 9999px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(
                180deg,
                #22d3ee,
                #0ea5e9
            );
            border-radius: 9999px;
            border: 2px solid #0f172a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(
                180deg,
                #67e8f9,
                #38bdf8
            );
        }

        ::-webkit-scrollbar-corner {
            background: #0f172a;
        }
    </style>
</head>

<body class="h-screen overflow-hidden bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <div class="absolute left-0 top-0 h-80 w-80 rounded-full bg-cyan-500/20 blur-3xl"></div>
        <div class="absolute right-0 top-24 h-96 w-96 rounded-full bg-sky-500/20 blur-3xl"></div>
        <div class="absolute bottom-0 left-1/3 h-72 w-72 rounded-full bg-emerald-500/10 blur-3xl"></div>
    </div>

    <div class="flex h-screen">
        {% include "partials/sidebar.html" %}

        <div class="flex h-full flex-1 flex-col overflow-hidden">
            {% include "partials/navbar.html" %}

            <main class="flex-1 overflow-y-auto px-4 py-6 sm:px-6 lg:px-8">
                {% include "partials/flash.html" %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
