{% extends "layouts/auth.html" %}

{% block content %}

<div class="rounded-[2rem] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-cyan-950/20 backdrop-blur-xl">
    <div class="mb-8 text-center">
        <h1 class="text-3xl font-semibold uppercase tracking-[0.35em] text-cyan-300">Tugumas Offset</h1>
        <h1 class="mt-3 text-xl font-bold text-white">Masuk ke admin dashboard</h1>        
    </div>

    <form method="post" class="space-y-5">
        <div>
            <label class="mb-2 block text-sm font-medium text-slate-200">Username</label>
            <input type="text" name="username" autocomplete="username" class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" placeholder="admin">
        </div>

        <div>
            <label class="mb-2 block text-sm font-medium text-slate-200">Password</label>
            <input type="password" name="password" autocomplete="current-password" class="w-full rounded-2xl border border-white/10 bg-slate-900/80 px-4 py-3 text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/20" placeholder="••••••••">
        </div>

        <button type="submit" class="flex w-full items-center justify-center rounded-2xl bg-cyan-400 px-4 py-3 text-sm font-bold text-slate-950 transition hover:bg-cyan-300">
            Login
        </button>
    </form>
</div>

{% endblock %}
